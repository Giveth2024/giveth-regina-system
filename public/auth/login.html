<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regina POS | Login</title>

    <link rel="stylesheet" href="../css/output.css">
</head>

<body class="min-h-screen bg-[#0A0A0A] flex items-center justify-center p-6">

    <div class="w-full max-w-md">

        <!-- Logo -->
        <div class="text-center mb-10">

            <div class="mx-auto w-20 h-20 rounded-full bg-[#D4AF37]/10 border border-[#D4AF37]/20 flex items-center justify-center mb-5">
                <span class="text-4xl">🛒</span>
            </div>

            <h1 class="text-4xl font-bold text-white">
                Regina POS
            </h1>

            <p class="text-[#848884] mt-3">
                Sign in to continue
            </p>

        </div>

        <!-- Login Card -->
        <div class="bg-[#111111] border border-[#2A2A2A] rounded-2xl p-8 shadow-xl">

            <form>

                <!-- Username -->
                <div class="mb-5">
                    <label class="block text-sm text-white mb-2">
                        Username or Email
                    </label>

                    <input
                        type="text"
                        placeholder="Enter your username or email"
                        class="w-full bg-[#1A1A1A] border border-[#2A2A2A] rounded-lg px-4 py-3 text-white placeholder:text-[#666] focus:outline-none focus:border-[#D4AF37]"
                    >
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label class="block text-sm text-white mb-2">
                        Password
                    </label>

                    <input
                        type="password"
                        placeholder="Enter your password"
                        class="w-full bg-[#1A1A1A] border border-[#2A2A2A] rounded-lg px-4 py-3 text-white placeholder:text-[#666] focus:outline-none focus:border-[#D4AF37]"
                    >
                </div>

                <!-- Forgot Password -->
                <div class="flex justify-end mb-8">
                    <a
                        href="#"
                        class="text-sm text-[#D4AF37] hover:underline"
                    >
                        Forgot Password?
                    </a>
                </div>

                <!-- Login Button -->
                <button
                    type="submit"
                    class="w-full bg-[#D4AF37] text-black font-semibold rounded-lg py-3 hover:brightness-95 transition duration-200 cursor-pointer"
                >
                    Login
                </button>

            </form>

        </div>

        <!-- Footer -->
        <div class="text-center mt-8">

            <p class="text-[#848884] text-sm">
                Don't have an account?
                <span class="text-[#D4AF37]">
                    Contact Administrator
                </span>
            </p>

        </div>

        <!-- Version -->
        <div class="text-center mt-8">

            <p class="text-xs text-[#555]">
                Regina POS High-Velocity System • Version 1.0
            </p>

        </div>

    </div>

</body>
</html>
