<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>View Stock | Giveth POS</title>
    <link rel="stylesheet" href="../css/output.css" />
    <link rel="shortcut icon" href="../assets/logo.jpg" type="image/x-icon" />
    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #0f0f0f;
        color: #f2f2f2;
        line-height: 1.5;
      }

      .page {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 20px 0 20px;
        /* padding-top: 90px; */
      }

      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
      }

      .top-bar h1 {
        margin: 0 0 6px;
        font-size: 30px;
      }

      .top-bar p {
        margin: 0;
        color: #b3b3b3;
      }

      .btn {
        border: none;
        padding: 10px 16px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
      }

      .btn-primary {
        background: #d4af37;
        color: #111;
      }

      .card {
        background: #1a1a1a;
        border: 1px solid #2f2f2f;
        border-radius: 12px;
        padding: 18px;
        margin-bottom: 20px;
      }

      .card h2 {
        margin-top: 0;
        margin-bottom: 14px;
        font-size: 18px;
      }

      .filters {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      .filter-group {
        display: flex;
        flex-direction: column;
      }

      .filter-group label {
        margin-bottom: 6px;
        font-size: 12px;
        font-weight: bold;
        text-transform: uppercase;
        color: #b3b3b3;
      }

      .filter-group input,
      .filter-group select {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #3a3a3a;
        border-radius: 8px;
        background: #111;
        color: #f2f2f2;
        box-sizing: border-box;
      }

      .checkbox-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      .checkbox-item {
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid #2f2f2f;
        border-radius: 8px;
        padding: 8px 10px;
        background: #121212;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
        margin: 20px 0;
      }

      .summary-card {
        background: #1a1a1a;
        border: 1px solid #2f2f2f;
        border-radius: 12px;
        padding: 16px;
      }

      .summary-card h3 {
        margin: 0 0 8px;
        font-size: 13px;
        text-transform: uppercase;
        color: #b3b3b3;
      }

      .summary-card .value {
        font-size: 24px;
        font-weight: bold;
      }

      .summary-card .value.small {
        font-size: 18px;
      }

      .summary-card .value.green {
        color: #7ee58d;
      }

      .summary-card .value.orange {
        color: #ffb347;
      }

      .summary-card .value.red {
        color: #ff7a7a;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px 10px;
        border-bottom: 1px solid #2d2d2d;
        text-align: left;
      }

      th {
        background: #161616;
        color: #b3b3b3;
        font-size: 12px;
        text-transform: uppercase;
      }

      tbody tr:hover {
        background: #202020;
      }

      .name strong {
        display: block;
      }

      .name small {
        color: #8c8c8c;
        font-size: 12px;
      }

      .status {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: bold;
      }

      .status.in {
        background: #173b22;
        color: #7ee58d;
      }

      .status.low {
        background: #3d260f;
        color: #ffb347;
      }

      .status.out {
        background: #3d1616;
        color: #ff7a7a;
      }

      .pagination {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-top: 18px;
        padding-top: 16px;
        border-top: 1px solid #2f2f2f;
        color: #b3b3b3;
        font-size: 14px;
      }

      .page-links {
        display: flex;
        gap: 8px;
      }

      .page-links button {
        border: 1px solid #3a3a3a;
        background: #121212;
        color: #f2f2f2;
        padding: 7px 10px;
        border-radius: 6px;
        cursor: pointer;
      }

      .page-links .active {
        background: #d4af37;
        color: #111;
        border-color: #d4af37;
      }

      @media (max-width: 900px) {
        .filters,
        .summary-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 600px) {
        .top-bar,
        .pagination {
          flex-direction: column;
          align-items: flex-start;
        }

        .filters,
        .summary-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div id="navbar"></div>

    <main class="page">
      <section class="top-bar">
        <div>
          <h1>View Stock</h1>
          <p>Search, filter and manage your inventory.</p>
        </div>
        <button class="btn btn-primary" id="addItem">+ Add New Item</button>
      </section>

      <form action="GET" id="viewStockForm">
        <section class="card">
          <h2>Quick Filters</h2>
          <div class="filters">
            <div class="filter-group">
              <label>Search</label>
              <input type="text" id="search" placeholder="Name or Item id or barcode..." />
            </div>
            <div class="filter-group">
              <label>Category</label>
              <select id="category">
                <option disabled selected>All Categories</option>
                <option value="Beer">Beer</option>
                <option value="Juice">Juice</option>
              </select>
            </div>
            <div class="filter-group">
              <label>Item Type</label>
              <select>
                <option>All Types</option>
              </select>
            </div>
            <div class="filter-group">
              <label>Sort By</label>
              <select>
                <option>Item Name</option>
                <option>Quantity</option>
                <option>Selling Price</option>
              </select>
            </div>
          </div>
        </section>
  
        <section class="card">
          <h2>Advanced Options</h2>
          <div class="filters">
            <div class="filter-group">
              <label>Min Quantity</label>
              <input type="number" id="min_quantity" placeholder="0" />
            </div>
            <div class="filter-group">
              <label>Max Quantity</label>
              <input type="number" id="max_quantity" placeholder="No limit" />
            </div>
            <div class="filter-group">
              <label>Min Selling Price</label>
              <input type="number" id="min_selling_price" placeholder="Min" />
            </div>
            <div class="filter-group">
              <label>Max Selling Price</label>
              <input type="number" id="max_selling_price" placeholder="Max" />
            </div>
          </div>
  
          <div class="checkbox-list">
            <label class="checkbox-item"
              ><input type="checkbox" /> Low Stock</label
            >
            <label class="checkbox-item"
              ><input type="checkbox" /> Out of Stock</label
            >
            <label class="checkbox-item"
              ><input type="checkbox" /> No Empty Bottles</label
            >
            <label class="checkbox-item"
              ><input type="checkbox" /> Has Empty Bottles</label
            >
            <label class="checkbox-item"
              ><input type="checkbox" /> Deleted Items</label
            >
          </div>
        </section>
      </form>

      <section class="summary-grid">
        <div class="summary-card">
          <h3>Items</h3>
          <div class="value" id="countItems">3</div>
        </div>
        <!-- <div class="summary-card">
          <h3>Total Inventory</h3>
          <div class="value">1,482</div>
        </div> -->
        <div class="summary-card">
          <h3>Low Stock</h3>
          <div class="value orange">8</div>
        </div>
        <div class="summary-card">
          <h3>Out of Stock</h3>
          <div class="value red">3</div>
        </div>
      </section>

      <section class="card">
        <table>
          <thead>
            <tr>
              <th>Item</th>
              <th>Category</th>
              <th>Qty</th>
              <th>Empty</th>
              <th>Cost Price</th>
              <th>Selling Price</th>
              <th>Profit</th>
              <th>Low Stock Level</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- Place the component here -->
            <!-- <script type="module" src="../components/viewStockRow.js"></script> -->
          </tbody>
        </table>
      </section>

      <section class="pagination">
        <div>Showing 1 to 3 of 50 entries</div>
        <div class="page-links">
          <button>«</button>
          <button class="active">1</button>
          <button>2</button>
          <button>3</button>
          <button>»</button>
        </div>
      </section>
    </main>

    <div id="footer"></div>

    <script type="module" src="../js/app.js"></script>
  </body>
</html>
